# Jekyll config file=

title: Saurron
# email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Saurron monitors containers on a single host, detects newer images, and automatically updates
  them — with safe rollback, structured audit logging, and flexible notifications.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  organicveggie

# Build settings
theme: just-the-docs
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

enable_copy_code_button: true

# Heading anchor links appear on hover over h1-h6 tags in page content
# allowing users to deep link to a particular heading on a page.
heading_anchors: true

collections_dir: collections
collections:
  development:
    output: true
  reference:
    output: true
  start:
    output: true

just_the_docs:
  collections:
    start:
      name: GETTING STARTED
    reference:
      name: REFERENCE
    development:
      name: DEVELOPMENT

aux_links:
  Saurron on GitHub:
    - https://github.com/organicveggie/saurron

mermaid:
  version: "11.14.0"

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

